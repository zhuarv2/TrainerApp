<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log In · TrainerApp</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <main class="auth-card">
    <h1 class="brand">🏋️ TrainerApp</h1>
    <p class="subtitle">Log in to your training schedule</p>

    <form id="login-form" novalidate>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />

      <p id="error-message" class="error-message" role="alert"></p>

      <button type="submit">Log In</button>
    </form>

    <p class="switch-link">No account yet? <a href="register.html">Register</a></p>
  </main>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
