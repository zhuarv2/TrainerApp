<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register · TrainerApp</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <main class="auth-card">
    <h1 class="brand">🏋️ TrainerApp</h1>
    <p class="subtitle">Create your account</p>

    <form id="register-form" novalidate>
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="new-password" />

      <p id="error-message" class="error-message" role="alert"></p>
      <p id="success-message" class="success-message" role="status"></p>

      <button type="submit">Register</button>
    </form>

    <p class="switch-link">Already have an account? <a href="login.html">Log in</a></p>
  </main>

  <script src="js/api.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
